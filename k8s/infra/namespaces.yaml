# k8s/infra/namespace.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: webgenai-core

---
# to create a separate ns for previews

apiVersion: v1
kind: Namespace
metadata:
  name: webgenai-previews

---
# configmap for shared config values across services

apiVersion: v1
kind: ConfigMap
metadata:
  name: webgenai-shared-config
  namespace: webgenai-core
data:
  PREVIEW_DOMAIN: "previews.sagardevlab.in"
  PREVIEW_NAMESPACE: "webgenai-previews"
  PROXY_PORT: "80"
  APP_FRONTEND_URL: "http://sagardevlab.in"
